name: AI Reversal Scanner

on:
  schedule:
    - cron: "55 3 * * 1-5"   # 9:25 AM IST
    - cron: "30 5 * * 1-5"   # 11:00 AM IST
    - cron: "0 8 * * 1-5"    # 1:30 PM IST
    - cron: "30 15 * * 1-5"  # 9:00 PM IST

  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance ta requests pandas numpy

      - name: Run scanner
        run: python scanner.py
